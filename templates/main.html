<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteLink</title>
</head>
<body>
    <h1 style="font-family: 'Courier New', Courier, monospace;">PasteLink</h1>
    <p style="font-family: 'Courier New', Courier, monospace;">welcome to PasteLink where you can easily share text snippets, paste the text below and generate a link to share:</p>
    <form action="/generate" method="post">
        <textarea name="text" rows="10" cols="50" placeholder="Paste your text here..."></textarea><br>
        <input type="submit" value="Generate Link" style="font-family: 'Courier New', Courier, monospace;">
    </form>
</body>
</html>
